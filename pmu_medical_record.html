<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PMU Medical Record</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --moss:       #4a6741;
    --moss-mid:   #6a8f60;
    --moss-light: #e8f0e6;
    --moss-pale:  #f3f7f2;
    --white:      #ffffff;
    --ink:        #2a2e28;
    --mist:       #7a8878;
    --line:       #dce8d8;
    --card:       #ffffff;
    --shadow:     rgba(74,103,65,0.10);
    --warn-bg:    #fff8ee;
    --warn-border:#f0d9a8;
    --warn-text:  #7a5a20;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--moss-pale);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.65;
  }

  /* ── LOADING ── */
  #loadingScreen {
    position: fixed; inset: 0;
    background: var(--moss);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999;
  }
  .loading-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 300;
    letter-spacing: 0.18em; color: #fff;
    margin-bottom: 6px;
  }
  .loading-sub {
    font-size: 11px; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.55); margin-bottom: 32px;
    text-transform: uppercase;
  }
  .loading-spinner {
    width: 28px; height: 28px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── HEADER ── */
  .app-header {
    background: var(--white);
    border-bottom: 1px solid var(--line);
    padding: 13px 18px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 6px var(--shadow);
  }
  .app-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 500;
    letter-spacing: 0.08em; color: var(--moss);
  }
  .app-logo small {
    display: block; font-family: 'Noto Sans JP', sans-serif;
    font-size: 9px; font-weight: 400;
    letter-spacing: 0.18em; color: var(--mist);
    text-transform: uppercase; margin-top: -2px;
  }
  .header-user {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--mist);
  }
  .header-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    object-fit: cover; border: 2px solid var(--moss-light);
  }

  /* ── TABS ── */
  .tabs {
    display: flex; background: var(--white);
    border-bottom: 1px solid var(--line);
    overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1; min-width: 76px; padding: 11px 6px;
    text-align: center; font-size: 11px; color: var(--mist);
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.2s; white-space: nowrap;
  }
  .tab.active { color: var(--moss); border-bottom-color: var(--moss); font-weight: 700; }
  .tab-icon { font-size: 15px; display: block; margin-bottom: 2px; }

  /* ── SCREENS ── */
  .screen { display: none; padding: 18px; padding-bottom: 88px; }
  .screen.active { display: block; }

  /* ── COMMON ── */
  .screen-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 500;
    color: var(--moss); margin-bottom: 3px;
  }
  .screen-subtitle { font-size: 12px; color: var(--mist); margin-bottom: 18px; }

  .section-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.15em; color: var(--moss-mid);
    text-transform: uppercase; margin: 20px 0 10px;
  }

  /* ── BUTTONS ── */
  .btn-primary {
    width: 100%; padding: 14px;
    background: var(--moss); color: #fff;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    margin-top: 14px; letter-spacing: 0.04em;
    font-family: 'Noto Sans JP', sans-serif;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-primary:hover { background: #3a5432; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: var(--mist); cursor: not-allowed; }

  .btn-secondary {
    width: 100%; padding: 12px;
    background: transparent; color: var(--moss);
    border: 1.5px solid var(--moss); border-radius: 10px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    margin-top: 10px; letter-spacing: 0.04em;
    font-family: 'Noto Sans JP', sans-serif;
    transition: background 0.2s;
  }
  .btn-secondary:hover { background: var(--moss-light); }

  /* ── SEARCH ── */
  .search-bar {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--line); border-radius: 9px;
    background: var(--white); font-size: 14px; color: var(--ink);
    margin-bottom: 14px; outline: none;
    font-family: 'Noto Sans JP', sans-serif;
    transition: border-color 0.2s;
  }
  .search-bar:focus { border-color: var(--moss-mid); }

  /* ── PATIENT CARDS ── */
  .patient-card {
    background: var(--white); border-radius: 12px;
    padding: 13px 15px; margin-bottom: 9px;
    display: flex; align-items: center; gap: 13px;
    box-shadow: 0 1px 6px var(--shadow);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1px solid var(--line);
  }
  .patient-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }
  .patient-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--moss-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
    font-weight: 700; color: var(--moss);
  }
  .patient-info { flex: 1; }
  .patient-name { font-weight: 500; font-size: 15px; }
  .patient-meta { font-size: 11px; color: var(--mist); margin-top: 2px; }
  .patient-badge {
    font-size: 11px; padding: 3px 9px;
    border-radius: 20px;
    background: var(--moss-light); color: var(--moss);
    font-weight: 500;
  }

  .empty-state {
    text-align: center; padding: 48px 20px; color: var(--mist);
  }
  .empty-icon { font-size: 44px; margin-bottom: 10px; }
  .empty-text { font-size: 13px; }

  /* ── KARTE HEADER ── */
  .karte-header {
    background: var(--white); border-radius: 14px;
    padding: 16px; margin-bottom: 14px;
    box-shadow: 0 1px 6px var(--shadow);
    display: flex; align-items: center; gap: 13px;
    border: 1px solid var(--line);
  }
  .karte-avatar-lg {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--moss-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: var(--moss); flex-shrink: 0;
  }
  .karte-name { font-size: 17px; font-weight: 500; }
  .karte-sub { font-size: 11px; color: var(--mist); margin-top: 2px; }

  /* ── RECORD CARDS ── */
  .record-card {
    background: var(--white); border-radius: 12px;
    padding: 15px; margin-bottom: 9px;
    box-shadow: 0 1px 6px var(--shadow);
    border-left: 3px solid var(--moss);
    border: 1px solid var(--line);
    border-left: 3px solid var(--moss);
  }
  .record-card.lip   { border-left-color: #b07a7a; }
  .record-card.eyeliner { border-left-color: #6a7a8a; }

  .record-date { font-size: 11px; color: var(--mist); margin-bottom: 5px; }
  .record-site { font-size: 15px; font-weight: 500; margin-bottom: 8px; display: flex; align-items: center; gap: 7px; }
  .site-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 20px;
    background: var(--moss-light); color: var(--moss); font-weight: 400;
  }
  .site-tag.lip { background: #f5e8e8; color: #8a5050; }
  .site-tag.eyeliner { background: #e8ecf0; color: #4a5a6a; }

  .record-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px 14px; }
  .record-item-label { font-size: 10px; color: var(--mist); }
  .record-item-value { font-size: 13px; font-weight: 500; }

  .removal-note {
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    border-radius: 8px; padding: 9px 11px;
    margin-top: 9px; font-size: 12px; color: var(--warn-text);
  }

  /* ── FORM ── */
  .form-section {
    background: var(--white); border-radius: 14px;
    padding: 16px; margin-bottom: 12px;
    box-shadow: 0 1px 6px var(--shadow);
    border: 1px solid var(--line);
  }
  .form-section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px; font-weight: 500; color: var(--moss);
    margin-bottom: 13px; padding-bottom: 9px;
    border-bottom: 1px solid var(--line);
  }
  .form-group { margin-bottom: 13px; }
  .form-label { display: block; font-size: 11px; color: var(--mist); margin-bottom: 5px; font-weight: 500; }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 9px 12px;
    border: 1.5px solid var(--line); border-radius: 8px;
    font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
    color: var(--ink); background: var(--moss-pale); outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--moss-mid); background: var(--white);
  }
  .form-textarea { resize: vertical; min-height: 78px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .site-selector { display: flex; gap: 8px; flex-wrap: wrap; }
  .site-btn {
    padding: 7px 15px; border-radius: 20px;
    border: 1.5px solid var(--line); background: transparent;
    font-size: 12px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s; color: var(--ink);
  }
  .site-btn.selected { background: var(--moss); border-color: var(--moss); color: #fff; }
  .site-btn[data-site="lip"].selected    { background: #b07a7a; border-color: #b07a7a; }
  .site-btn[data-site="eyeliner"].selected { background: #6a7a8a; border-color: #6a7a8a; }

  /* ── SHARE ── */
  .share-card {
    background: var(--white); border-radius: 14px;
    padding: 22px; text-align: center;
    box-shadow: 0 1px 6px var(--shadow);
    border: 1px solid var(--line); margin-bottom: 12px;
  }
  .share-url-label { font-size: 11px; color: var(--mist); margin-bottom: 6px; }
  .share-url-text {
    font-size: 12px; color: var(--moss);
    word-break: break-all; line-height: 1.5;
    background: var(--moss-pale); border-radius: 8px;
    padding: 10px 12px; margin-bottom: 6px;
  }
  .share-desc { font-size: 12px; color: var(--mist); }

  /* ── PATIENT VIEW ── */
  #patientViewScreen { display: none; padding-bottom: 40px; }
  #patientViewScreen.active { display: block; }
  .pv-header {
    background: linear-gradient(150deg, var(--moss) 0%, #6a8f60 100%);
    color: #fff; text-align: center;
    padding: 36px 20px 22px;
  }
  .pv-avatar {
    width: 60px; height: 60px; border-radius: 50%;
    background: rgba(255,255,255,0.18);
    margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700;
  }
  .pv-name { font-size: 20px; font-weight: 500; margin-bottom: 3px; }
  .pv-sub { font-size: 11px; opacity: 0.7; letter-spacing: 0.08em; }

  .pv-record {
    background: var(--white); border-radius: 12px;
    padding: 15px; margin: 10px 18px 0;
    box-shadow: 0 1px 6px var(--shadow);
    border: 1px solid var(--line);
    border-left: 3px solid var(--moss);
  }
  .pv-record.lip { border-left-color: #b07a7a; }
  .pv-record.eyeliner { border-left-color: #6a7a8a; }
  .pv-record-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 11px;
  }
  .pv-site { font-size: 15px; font-weight: 500; }
  .pv-date { font-size: 11px; color: var(--mist); }
  .pv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .pv-item { background: var(--moss-pale); border-radius: 8px; padding: 9px; }
  .pv-item-label { font-size: 10px; color: var(--mist); margin-bottom: 2px; }
  .pv-item-value { font-size: 13px; font-weight: 500; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 20px 20px 0 0;
    padding: 22px 18px; width: 100%;
    max-height: 88vh; overflow-y: auto;
    animation: slideUp 0.28s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 34px; height: 4px; background: var(--line);
    border-radius: 2px; margin: -8px auto 18px;
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 500; color: var(--moss);
    margin-bottom: 15px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 92px; left: 50%;
    transform: translateX(-50%);
    background: var(--moss); color: #fff;
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; z-index: 300;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
    box-shadow: 0 4px 12px rgba(74,103,65,0.3);
  }
  .toast.show { opacity: 1; }
</style>
</head>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="loading-logo">PMU Medical Record</div>
  <div class="loading-sub">Permanent Makeup Karte System</div>
  <div class="loading-spinner"></div>
</div>

<!-- HEADER -->
<div class="app-header" id="appHeader" style="display:none;">
  <div class="app-logo">
    PMU Medical Record
    <small>Permanent Makeup Karte</small>
  </div>
  <div class="header-user">
    <img class="header-avatar" id="userAvatar" src="" alt="">
    <span id="userName"></span>
  </div>
</div>

<!-- TABS -->
<div class="tabs" id="mainTabs" style="display:none;">
  <div class="tab active" onclick="showTab('patients')" data-tab="patients">
    <span class="tab-icon">👥</span>患者一覧
  </div>
  <div class="tab" onclick="showTab('karte')" data-tab="karte">
    <span class="tab-icon">📋</span>カルテ
  </div>
  <div class="tab" onclick="showTab('newRecord')" data-tab="newRecord">
    <span class="tab-icon">✏️</span>記録追加
  </div>
  <div class="tab" onclick="showTab('share')" data-tab="share">
    <span class="tab-icon">🔗</span>共有
  </div>
</div>

<!-- SCREEN: PATIENTS -->
<div class="screen active" id="screen-patients">
  <div class="screen-title">患者一覧</div>
  <div class="screen-subtitle">タップしてカルテを確認</div>
  <input class="search-bar" type="text" placeholder="🔍　名前で検索" oninput="filterPatients(this.value)">
  <div id="patientList">
    <div class="empty-state">
      <div class="empty-icon">🌿</div>
      <div class="empty-text">患者を登録してください</div>
    </div>
  </div>
  <button class="btn-primary" onclick="showModal('newPatient')">＋ 新規患者を登録</button>
</div>

<!-- SCREEN: KARTE -->
<div class="screen" id="screen-karte">
  <div class="karte-header">
    <div class="karte-avatar-lg" id="karteAvatar">？</div>
    <div>
      <div class="karte-name" id="kartePatientName">—</div>
      <div class="karte-sub" id="kartePatientSub">—</div>
    </div>
  </div>
  <div class="section-label">施術記録</div>
  <div id="recordList">
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-text">まだ記録がありません</div>
    </div>
  </div>
  <button class="btn-primary" onclick="showTab('newRecord')">＋ 施術記録を追加</button>
</div>

<!-- SCREEN: NEW RECORD -->
<div class="screen" id="screen-newRecord">
  <div class="screen-title">施術記録を追加</div>
  <div class="screen-subtitle">新しい施術内容を登録します</div>

  <div class="form-section">
    <div class="form-section-title">患者</div>
    <div class="form-group">
      <label class="form-label">患者名 *</label>
      <select class="form-select" id="recordPatientSelect">
        <option value="">選択してください</option>
      </select>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">施術部位</div>
    <div class="site-selector">
      <button class="site-btn selected" data-site="eyebrow" onclick="selectSite(this)">🎨 眉毛</button>
      <button class="site-btn" data-site="lip" onclick="selectSite(this)">💋 リップ</button>
      <button class="site-btn" data-site="eyeliner" onclick="selectSite(this)">👁 アイライン</button>
      <button class="site-btn" data-site="other" onclick="selectSite(this)">＋ その他</button>
    </div>
    <input class="form-input" type="text" id="siteOtherInput" placeholder="部位を入力" style="margin-top:10px; display:none;">
  </div>

  <div class="form-section">
    <div class="form-section-title">色素情報</div>
    <div class="form-group">
      <label class="form-label">色素メーカー *</label>
      <input class="form-input" type="text" id="pigmentMaker" placeholder="例: Li Pigments, Perma Blend...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">品番・カラー名 *</label>
        <input class="form-input" type="text" id="pigmentCode" placeholder="例: Brunette 03">
      </div>
      <div class="form-group">
        <label class="form-label">投入量</label>
        <input class="form-input" type="text" id="pigmentAmount" placeholder="例: 0.5ml">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">ロット番号（任意）</label>
      <input class="form-input" type="text" id="pigmentLot" placeholder="例: LP240115">
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">施術内容</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">施術日 *</label>
        <input class="form-input" type="date" id="treatmentDate">
      </div>
      <div class="form-group">
        <label class="form-label">施術手法 *</label>
        <select class="form-select" id="treatmentMethod">
          <option>毛並みストローク</option>
          <option>マシン</option>
          <option>手彫り（ハンドポーク）</option>
          <option>コンボ</option>
          <option>シェーディング</option>
          <option>その他</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">針・ニードル種類</label>
      <input class="form-input" type="text" id="needleType" placeholder="例: 1R, 3R, U型...">
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">除去・メモ</div>
    <div class="form-group">
      <label class="form-label">除去に関する注記</label>
      <textarea class="form-textarea" id="removalNote" placeholder="除去検討中の場合や注意事項..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">施術者メモ</label>
      <textarea class="form-textarea" id="practitionerMemo" placeholder="肌質・反応・特記事項など..."></textarea>
    </div>
  </div>

  <button class="btn-primary" id="saveRecordBtn" onclick="saveRecord()">💾 記録を保存</button>
</div>

<!-- SCREEN: SHARE -->
<div class="screen" id="screen-share">
  <div class="screen-title">患者に共有</div>
  <div class="screen-subtitle">患者さんが記録を確認できるURLを発行します</div>
  <div class="form-section">
    <div class="form-section-title">患者を選択</div>
    <select class="form-select" id="sharePatientSelect" onchange="updateShareInfo()">
      <option value="">選択してください</option>
    </select>
  </div>
  <div class="share-card" id="shareCard" style="display:none;">
    <div class="share-url-label">共有URL</div>
    <div class="share-url-text" id="shareUrl">—</div>
    <div class="share-desc" id="shareDesc"></div>
  </div>
  <button class="btn-primary"   id="copyUrlBtn"  style="display:none;" onclick="copyShareUrl()">🔗 URLをコピー</button>
  <button class="btn-secondary" id="lineShareBtn" style="display:none;" onclick="shareViaLine()">💬 LINEで送る</button>
</div>

<!-- PATIENT VIEW -->
<div id="patientViewScreen">
  <div class="pv-header">
    <div class="pv-avatar" id="pvAvatar">？</div>
    <div class="pv-name" id="pvName">—</div>
    <div class="pv-sub">あなたのアートメイク記録</div>
  </div>
  <div id="pvRecordList"></div>
</div>

<!-- MODAL: NEW PATIENT -->
<div class="modal-overlay" id="modal-newPatient" onclick="closeModal('newPatient')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">新規患者を登録</div>
    <div class="form-group">
      <label class="form-label">氏名 *</label>
      <input class="form-input" type="text" id="newPatientName" placeholder="例: 田中 美咲">
    </div>
    <div class="form-group">
      <label class="form-label">ふりがな</label>
      <input class="form-input" type="text" id="newPatientKana" placeholder="例: たなか みさき">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">生年月日</label>
        <input class="form-input" type="date" id="newPatientBirth">
      </div>
      <div class="form-group">
        <label class="form-label">連絡先</label>
        <input class="form-input" type="tel" id="newPatientPhone" placeholder="090-XXXX-XXXX">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">特記事項（アレルギー等）</label>
      <textarea class="form-textarea" id="newPatientNotes" placeholder="アレルギー歴・皮膚疾患・注意事項など"></textarea>
    </div>
    <button class="btn-primary" id="savePatientBtn" onclick="savePatient()">登録する</button>
    <button class="btn-secondary" onclick="closeModal('newPatient')">キャンセル</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
var sb, currentUser, practitionerId, patients = [], currentPatientId, selectedSite = 'eyebrow';

// ===== INIT =====
async function init() {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  var params = new URLSearchParams(location.search);
  var token  = params.get('token');
  if (token) { await loadPatientView(token); return; }

  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    var profile = await liff.getProfile();
    currentUser = profile;
    document.getElementById('userName').textContent   = profile.displayName;
    document.getElementById('userAvatar').src         = profile.pictureUrl || '';
    await ensurePractitioner(profile.userId, profile.displayName);
    await loadPatients();
    showUI();
  } catch(e) {
    console.warn('LIFF error (dev mode):', e);
    practitionerId = 'dev-mode';
    showUI();
    showToast('⚠️ 開発モードで起動中');
  }
}

function showUI() {
  document.getElementById('loadingScreen').style.display  = 'none';
  document.getElementById('appHeader').style.display      = 'flex';
  document.getElementById('mainTabs').style.display       = 'flex';
}

// ===== PRACTITIONER =====
async function ensurePractitioner(lineId, name) {
  var { data } = await sb.from('practitioners').select('id').eq('line_user_id', lineId).single();
  if (data) { practitionerId = data.id; return; }
  var { data: np } = await sb.from('practitioners').insert({ line_user_id: lineId, name }).select('id').single();
  if (np) practitionerId = np.id;
}

// ===== PATIENTS =====
async function loadPatients() {
  if (!practitionerId || practitionerId === 'dev-mode') return;
  var { data } = await sb.from('patients').select('*').eq('practitioner_id', practitionerId).order('created_at', { ascending: false });
  patients = data || [];
  renderPatientList(patients);
  populateSelects();
}

function renderPatientList(list) {
  var el = document.getElementById('patientList');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🌿</div><div class="empty-text">患者を登録してください</div></div>';
    return;
  }
  el.innerHTML = list.map(function(p) {
    return '<div class="patient-card" onclick="openKarte(\'' + p.id + '\')">'
      + '<div class="patient-avatar">' + p.name.charAt(0) + '</div>'
      + '<div class="patient-info">'
      + '<div class="patient-name">' + p.name + '</div>'
      + '<div class="patient-meta">' + (p.name_kana || '') + '　登録: ' + fmtDate(p.created_at) + '</div>'
      + '</div></div>';
  }).join('');
}

function populateSelects() {
  var opts = patients.map(function(p) { return '<option value="' + p.id + '">' + p.name + '</option>'; }).join('');
  document.getElementById('recordPatientSelect').innerHTML = '<option value="">選択してください</option>' + opts;
  document.getElementById('sharePatientSelect').innerHTML  = '<option value="">選択してください</option>' + opts;
}

function filterPatients(v) {
  renderPatientList(patients.filter(function(p) { return p.name.includes(v) || (p.name_kana||'').includes(v); }));
}

async function savePatient() {
  var name = document.getElementById('newPatientName').value.trim();
  if (!name) { showToast('⚠️ 氏名を入力してください'); return; }
  var btn = document.getElementById('savePatientBtn');
  btn.disabled = true; btn.textContent = '登録中...';
  var { error } = await sb.from('patients').insert({
    practitioner_id: practitionerId,
    name: name,
    name_kana:  document.getElementById('newPatientKana').value,
    birth_date: document.getElementById('newPatientBirth').value || null,
    phone:      document.getElementById('newPatientPhone').value,
    notes:      document.getElementById('newPatientNotes').value,
  });
  btn.disabled = false; btn.textContent = '登録する';
  if (error) { showToast('❌ エラーが発生しました'); return; }
  closeModal('newPatient');
  showToast('✅ 患者を登録しました！');
  ['newPatientName','newPatientKana','newPatientBirth','newPatientPhone','newPatientNotes'].forEach(function(id){ document.getElementById(id).value=''; });
  await loadPatients();
}

// ===== KARTE =====
async function openKarte(pid) {
  currentPatientId = pid;
  var p = patients.find(function(x){ return x.id === pid; });
  if (!p) return;
  document.getElementById('karteAvatar').textContent      = p.name.charAt(0);
  document.getElementById('kartePatientName').textContent = p.name;
  document.getElementById('kartePatientSub').textContent  = p.name_kana || '';
  await loadRecords(pid);
  showTab('karte');
}

async function loadRecords(pid) {
  var { data } = await sb.from('records').select('*').eq('patient_id', pid).order('treatment_date', { ascending: false });
  renderRecords(data || []);
}

function renderRecords(list) {
  var el = document.getElementById('recordList');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">まだ記録がありません</div></div>';
    return;
  }
  var em = { eyebrow:'🎨', lip:'💋', eyeliner:'👁', other:'✏️' };
  el.innerHTML = list.map(function(r) {
    return '<div class="record-card ' + r.site + '">'
      + '<div class="record-date">' + r.treatment_date + '</div>'
      + '<div class="record-site">' + (em[r.site]||'✏️') + ' ' + siteLabel(r.site)
      + '<span class="site-tag ' + r.site + '">' + r.site + '</span></div>'
      + '<div class="record-grid">'
      + '<div><div class="record-item-label">色素メーカー</div><div class="record-item-value">' + (r.pigment_maker||'—') + '</div></div>'
      + '<div><div class="record-item-label">品番</div><div class="record-item-value">' + (r.pigment_code||'—') + '</div></div>'
      + '<div><div class="record-item-label">手法</div><div class="record-item-value">' + (r.method||'—') + '</div></div>'
      + '<div><div class="record-item-label">投入量</div><div class="record-item-value">' + (r.amount||'—') + '</div></div>'
      + '</div>'
      + (r.removal_note ? '<div class="removal-note">⚠️ ' + r.removal_note + '</div>' : '')
      + '</div>';
  }).join('');
}

// ===== RECORDS =====
async function saveRecord() {
  var pid    = document.getElementById('recordPatientSelect').value;
  var maker  = document.getElementById('pigmentMaker').value.trim();
  var code   = document.getElementById('pigmentCode').value.trim();
  var date   = document.getElementById('treatmentDate').value;
  if (!pid)   { showToast('⚠️ 患者を選択してください'); return; }
  if (!maker || !code) { showToast('⚠️ 色素メーカーと品番を入力してください'); return; }
  if (!date)  { showToast('⚠️ 施術日を入力してください'); return; }
  var btn = document.getElementById('saveRecordBtn');
  btn.disabled = true; btn.textContent = '保存中...';
  var site = selectedSite === 'other' ? (document.getElementById('siteOtherInput').value || 'other') : selectedSite;
  var { error } = await sb.from('records').insert({
    patient_id:    pid,
    site:          site,
    treatment_date: date,
    pigment_maker: maker,
    pigment_code:  code,
    pigment_lot:   document.getElementById('pigmentLot').value,
    amount:        document.getElementById('pigmentAmount').value,
    method:        document.getElementById('treatmentMethod').value,
    needle:        document.getElementById('needleType').value,
    removal_note:  document.getElementById('removalNote').value,
    memo:          document.getElementById('practitionerMemo').value,
  });
  btn.disabled = false; btn.textContent = '💾 記録を保存';
  if (error) { showToast('❌ エラーが発生しました'); return; }
  showToast('✅ 施術記録を保存しました！');
  currentPatientId = pid;
  await loadRecords(pid);
  showTab('karte');
}

// ===== SHARE =====
function updateShareInfo() {
  var pid = document.getElementById('sharePatientSelect').value;
  if (!pid) { document.getElementById('shareCard').style.display='none'; document.getElementById('copyUrlBtn').style.display='none'; document.getElementById('lineShareBtn').style.display='none'; return; }
  var p = patients.find(function(x){ return x.id === pid; });
  if (!p) return;
  var url = location.origin + location.pathname + '?token=' + p.share_token;
  document.getElementById('shareUrl').textContent  = url;
  document.getElementById('shareDesc').textContent = p.name + ' さんの記録閲覧URL';
  document.getElementById('shareCard').style.display    = 'block';
  document.getElementById('copyUrlBtn').style.display   = 'block';
  document.getElementById('lineShareBtn').style.display = 'block';
}
function copyShareUrl() {
  navigator.clipboard.writeText(document.getElementById('shareUrl').textContent)
    .then(function(){ showToast('📋 URLをコピーしました！'); });
}
function shareViaLine() {
  var url = document.getElementById('shareUrl').textContent;
  var pid = document.getElementById('sharePatientSelect').value;
  var p   = patients.find(function(x){ return x.id === pid; });
  var msg = '【PMU Medical Record】' + (p ? p.name : '') + 'さんのアートメイク記録をご確認いただけます。\n' + url;
  if (liff.isApiAvailable && liff.isApiAvailable('shareTargetPicker')) {
    liff.shareTargetPicker([{ type: 'text', text: msg }]);
  } else {
    window.open('https://line.me/R/msg/text/?' + encodeURIComponent(msg));
  }
}

// ===== PATIENT VIEW =====
async function loadPatientView(token) {
  document.getElementById('loadingScreen').style.display = 'none';
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  var { data: p } = await sb.from('patients').select('*').eq('share_token', token).single();
  if (!p) { document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#888;">記録が見つかりませんでした</div>'; return; }
  var { data: records } = await sb.from('records').select('*').eq('patient_id', p.id).order('treatment_date', { ascending: false });
  document.getElementById('pvAvatar').textContent = p.name.charAt(0);
  document.getElementById('pvName').textContent   = p.name;
  var em = { eyebrow:'🎨', lip:'💋', eyeliner:'👁', other:'✏️' };
  var el = document.getElementById('pvRecordList');
  el.innerHTML = (records||[]).map(function(r) {
    return '<div class="pv-record ' + r.site + '">'
      + '<div class="pv-record-header"><div class="pv-site">' + (em[r.site]||'✏️') + ' ' + siteLabel(r.site) + '</div><div class="pv-date">' + r.treatment_date + '</div></div>'
      + '<div class="pv-grid">'
      + '<div class="pv-item"><div class="pv-item-label">色素メーカー</div><div class="pv-item-value">' + (r.pigment_maker||'—') + '</div></div>'
      + '<div class="pv-item"><div class="pv-item-label">カラー</div><div class="pv-item-value">' + (r.pigment_code||'—') + '</div></div>'
      + '<div class="pv-item"><div class="pv-item-label">手法</div><div class="pv-item-value">' + (r.method||'—') + '</div></div>'
      + '<div class="pv-item"><div class="pv-item-label">施術量</div><div class="pv-item-value">' + (r.amount||'—') + '</div></div>'
      + '</div>'
      + (r.removal_note ? '<div class="removal-note" style="margin-top:10px;">⚠️ ' + r.removal_note + '</div>' : '')
      + '</div>';
  }).join('') || '<div style="padding:30px;text-align:center;color:#888;">記録がありません</div>';
  document.getElementById('patientViewScreen').classList.add('active');
}

// ===== HELPERS =====
function showTab(t) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('screen-' + t).classList.add('active');
  document.querySelector('[data-tab="' + t + '"]').classList.add('active');
}
function selectSite(btn) {
  document.querySelectorAll('.site-btn').forEach(function(b){ b.classList.remove('selected'); });
  btn.classList.add('selected');
  selectedSite = btn.dataset.site;
  document.getElementById('siteOtherInput').style.display = selectedSite === 'other' ? 'block' : 'none';
}
function showModal(n) { document.getElementById('modal-' + n).classList.add('open'); }
function closeModal(n) { document.getElementById('modal-' + n).classList.remove('open'); }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2600);
}
function fmtDate(s) { return s ? s.slice(0,10) : ''; }
function siteLabel(s) {
  return { eyebrow:'眉毛（アイブロウ）', lip:'リップ', eyeliner:'アイライン', other:'その他' }[s] || s;
}

init();
</script>
</body>
</html>
